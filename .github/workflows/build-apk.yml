name: Build NGR Neo APK One File

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Recreate Flutter project from workflow
        shell: bash
        run: |
          set -e
          rm -rf android ios web linux macos windows test lib assets pubspec.yaml analysis_options.yaml
          flutter create . --platforms=android --project-name ngr_neo
          mkdir -p lib assets
          cat > pubspec.yaml <<'EOF_PUB'
name: ngr_neo
version: 0.1.0+1
publish_to: "none"
description: NGR Neo - Liquid Garage OS, Flutter rebuild for Honda Beat FI 2014.

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/ngr_icon.png

EOF_PUB
          cat > lib/main.dart <<'EOF_MAIN'
import 'dart:convert';
import 'dart:math' as math;
import 'dart:ui';

import 'package:flutter/cupertino.dart';
import 'package:flutter/material.dart';
import 'package:flutter/services.dart';
import 'package:shared_preferences/shared_preferences.dart';

void main() {
  WidgetsFlutterBinding.ensureInitialized();
  runApp(const NgrNeoApp());
}

class NgrNeoApp extends StatelessWidget {
  const NgrNeoApp({super.key});

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      title: 'NGR Neo',
      debugShowCheckedModeBanner: false,
      theme: ThemeData(
        useMaterial3: true,
        brightness: Brightness.dark,
        scaffoldBackgroundColor: NeoColors.bg,
        fontFamily: 'Roboto',
        colorScheme: const ColorScheme.dark(
          primary: NeoColors.cyan,
          secondary: NeoColors.blue,
          surface: NeoColors.card,
        ),
      ),
      home: const NeoRoot(),
    );
  }
}

